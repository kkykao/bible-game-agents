version: '3.8'

services:
  backend:
    build: .
    container_name: bible_game_backend
    ports:
      - "8000:8000"
    environment:
      - DEPLOYMENT_ENV=development
      - DATABASE_URL=sqlite:////app/data/game.db
      - ANTHROPIC_API_KEY=\
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bible_game_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000/api
    depends_on:
      - backend
    restart: unless-stopped
